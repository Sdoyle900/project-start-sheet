<style>
  :root{
    --steel:#1A2B3C;
    --steel-light:#3D5166;
    --steel-pale:#E7ECF0;
    --line:#D7DEE4;
    --muted:#6B7B8C;
    --paper:#FFFFFF;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    background:#F3F5F6;
    font-family:'Inter',sans-serif;
    color:var(--steel);
  }

  .page-wrap{
    max-width:980px;
    margin:0 auto;
    padding:24px 0 32px;
  }

  /* ---------- Tabs ---------- */
  .tabs-bar{
    display:flex;
    align-items:flex-end;
    gap:6px;
    padding:0 4px;
    overflow-x:auto;
  }
  .project-tab{
    background:#E3E9EC;
    color:var(--steel-light);
    border:1px solid var(--line);
    border-bottom:none;
    border-radius:6px 6px 0 0;
    padding:9px 14px;
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
    display:flex;
    align-items:center;
    gap:8px;
    max-width:220px;
    flex:0 0 auto;
  }
  .project-tab .tab-label{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .project-tab.active{
    background:#fff;
    color:var(--steel);
  }
  .project-tab:hover{ background:#EDF1F3; }
  .project-tab.active:hover{ background:#fff; }
  .tab-close{
    opacity:0;
    font-size:14px;
    line-height:1;
    color:var(--muted);
    padding:0 2px;
    border-radius:2px;
  }
  .project-tab:hover .tab-close{ opacity:1; }
  @media (hover: none){
    .tab-close{ opacity:0.6; }
  }
  .tab-close.confirm{
    opacity:1;
    color:#fff;
    background:#B33A3A;
  }
  .new-tab-btn{
    background:transparent;
    border:1.5px dashed var(--steel-light);
    color:var(--steel-light);
    border-radius:6px;
    width:34px;
    height:34px;
    font-size:17px;
    line-height:1;
    cursor:pointer;
    flex:0 0 auto;
  }
  .new-tab-btn:hover{ background:var(--steel-pale); }
  .file-action-btn{
    display:flex;
    align-items:center;
    gap:6px;
    background:#fff;
    border:1px solid var(--line);
    color:var(--steel-light);
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:12px;
    padding:8px 13px;
    border-radius:6px;
    cursor:pointer;
    flex:0 0 auto;
  }
  .file-action-btn:hover{ background:var(--steel-pale); }
  .file-action-btn svg{ width:14px; height:14px; }
  .save-status{
    margin-left:auto;
    align-self:center;
    font-size:11.5px;
    color:var(--muted);
    padding:0 6px;
    white-space:nowrap;
  }

  .sheet{
    max-width:980px;
    margin:0 auto;
    background:var(--paper);
    box-shadow:0 1px 3px rgba(26,43,60,0.08), 0 12px 32px rgba(26,43,60,0.06);
  }

  /* ---------- Header ---------- */
  .header{
    background:var(--steel);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 32px;
  }
  .logo-box{
    width:190px;
    height:60px;
    background:#fff;
    border-radius:3px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:8px 14px;
  }
  .logo-box img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
  }
  .header-right{
    display:flex;
    align-items:center;
    gap:16px;
  }
  .doc-type{
    font-family:'Inter',sans-serif;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#C9D3DA;
  }
  .print-btn{
    background:#fff;
    color:var(--steel);
    border:none;
    padding:10px 20px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13px;
    border-radius:3px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    transition:background .15s ease;
  }
  .print-btn:hover{ background:#E7ECF0; }
  .print-btn svg{ width:15px; height:15px; }

  /* ---------- Title block ---------- */
  .title-block{
    padding:36px 32px 28px;
    border-bottom:1px solid var(--line);
  }
  .eyebrow-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:10px;
  }
  .eyebrow{
    font-family:'Inter',sans-serif;
    font-size:11px;
    font-weight:600;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--muted);
  }
  .date-stamp{
    font-size:12px;
    color:var(--muted);
  }
  #projectTitle{
    width:100%;
    border:none;
    outline:none;
    background:transparent;
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:38px;
    color:var(--steel);
    padding:0;
    text-transform:uppercase;
    letter-spacing:0.5px;
  }
  #projectTitle::placeholder{ color:#B7C2CA; }
  .title-rule{
    height:3px;
    width:64px;
    background:var(--steel);
    margin-top:14px;
  }

  /* ---------- Sections grid ---------- */
  .sections-wrap{
    padding:28px 32px 40px;
  }
  .sections-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:22px;
  }

  .section-card{
    position:relative;
    border:1px solid var(--line);
    border-radius:4px;
    padding:18px 16px 16px;
    overflow:hidden;
    break-inside:avoid;
    page-break-inside:avoid;
  }
  .section-index{
    position:absolute;
    top:-6px;
    right:6px;
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:56px;
    color:var(--steel-pale);
    z-index:0;
    line-height:1;
    user-select:none;
  }
  .section-head{
    position:relative;
    z-index:1;
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:12px;
  }
  .section-title{
    flex:1;
    border:none;
    outline:none;
    background:transparent;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:18px;
    color:var(--steel);
    border-bottom:1px solid var(--line);
    padding:2px 0 6px;
  }
  .section-title::placeholder{ color:#AEBAC2; }
  .remove-btn{
    background:none;
    border:none;
    color:var(--muted);
    font-size:18px;
    line-height:1;
    cursor:pointer;
    padding:2px 4px;
  }
  .remove-btn:hover{ color:#B33A3A; }

  .subheadings{
    position:relative;
    z-index:1;
  }
  .subheading-row{
    display:flex;
    align-items:center;
    gap:6px;
    margin-bottom:6px;
  }
  .subheading-dash{
    color:var(--line);
    font-size:13px;
  }
  .subheading-input{
    flex:1;
    border:none;
    outline:none;
    background:transparent;
    font-family:'Inter',sans-serif;
    font-weight:500;
    font-size:13px;
    color:var(--steel-light);
    border-bottom:1px dashed var(--line);
    padding:1px 0 4px;
  }
  .subheading-input::placeholder{ color:#BCC6CD; }
  .subheading-remove{
    background:none;
    border:none;
    color:var(--muted);
    font-size:15px;
    line-height:1;
    cursor:pointer;
    padding:0 2px;
  }
  .subheading-remove:hover{ color:#B33A3A; }
  .add-subheading-btn{
    display:inline-flex;
    align-items:center;
    gap:4px;
    background:none;
    border:none;
    color:var(--steel-light);
    font-family:'Inter',sans-serif;
    font-size:11.5px;
    font-weight:600;
    letter-spacing:0.2px;
    cursor:pointer;
    padding:2px 0;
    margin-bottom:10px;
  }
  .add-subheading-btn:hover{ text-decoration:underline; }

  .upload-box{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:170px;
    min-height:90px;
    max-height:700px;
    background:#F8F9FA;
    border:1.5px dashed var(--line);
    border-radius:4px;
    cursor:pointer;
    overflow:hidden;
    text-align:center;
    resize:vertical;
  }
  .upload-box:hover{ background:var(--steel-pale); }
  .upload-box input[type="file"]{ display:none; }
  .upload-prompt{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    color:var(--muted);
  }
  .upload-prompt svg{ width:26px; height:26px; opacity:0.6; }
  .upload-prompt span{ font-size:12.5px; font-weight:500; }
  .preview-img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
    cursor:pointer;
  }
  .image-actions{
    position:absolute;
    left:8px;
    right:8px;
    bottom:8px;
    display:none;
    justify-content:space-between;
    align-items:center;
    gap:6px;
  }
  .upload-box.has-image .image-actions{ display:flex; }
  .image-actions .size-controls,
  .image-actions .edit-controls{
    display:flex;
    gap:6px;
  }
  .image-actions button{
    background:rgba(26,43,60,0.8);
    color:#fff;
    font-size:11px;
    padding:6px 10px;
    border-radius:3px;
    border:none;
    font-weight:600;
    line-height:1;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .image-actions button:hover{ background:var(--steel); }
  .image-actions .size-btn{
    width:26px;
    padding:6px 0;
    font-size:14px;
    text-align:center;
  }

  /* ---------- Crop modal ---------- */
  .crop-modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(15,22,29,0.72);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
  }
  .crop-modal-overlay.active{ display:flex; }
  .crop-modal{
    background:#fff;
    border-radius:6px;
    width:100%;
    max-width:620px;
    overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,0.35);
  }
  .crop-modal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 20px;
    background:var(--steel);
    color:#fff;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:15px;
    letter-spacing:0.3px;
  }
  .crop-modal-close{
    background:none;
    border:none;
    color:#fff;
    font-size:20px;
    cursor:pointer;
    line-height:1;
    padding:0 4px;
  }
  .crop-modal-body{
    background:#2B2F33;
    height:420px;
    max-height:60vh;
  }
  .crop-image-wrap{
    width:100%;
    height:100%;
    overflow:hidden;
  }
  .crop-image-wrap img{
    display:block;
    max-width:100%;
  }
  .crop-modal-footer{
    padding:16px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    border-top:1px solid var(--line);
  }
  .zoom-control{
    display:flex;
    align-items:center;
    gap:10px;
    flex:1;
  }
  .zoom-control span{
    font-size:12px;
    font-weight:600;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:1px;
  }
  .zoom-control input[type="range"]{
    flex:1;
    accent-color:var(--steel);
  }
  .crop-modal-actions{
    display:flex;
    gap:10px;
  }
  .btn-secondary, .btn-primary{
    border:none;
    padding:9px 18px;
    border-radius:3px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
  }
  .btn-secondary{
    background:#F0F2F3;
    color:var(--steel);
  }
  .btn-secondary:hover{ background:#E2E6E8; }
  .btn-primary{
    background:var(--steel);
    color:#fff;
  }
  .btn-primary:hover{ background:var(--steel-light); }

  .add-tile{
    border:1.5px dashed var(--steel-light);
    border-radius:4px;
    min-height:228px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    cursor:pointer;
    color:var(--steel-light);
    background:#fff;
    transition:background .15s ease;
  }
  .add-tile:hover{ background:var(--steel-pale); }
  .add-tile .plus{
    width:40px;
    height:40px;
    border-radius:50%;
    border:2px solid var(--steel-light);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:600;
  }
  .add-tile span{
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    letter-spacing:0.3px;
  }

  /* ---------- Small screens / phones ---------- */
  @media (max-width: 640px){
    .page-wrap{ padding:12px 0 24px; }
    .tabs-bar{ padding:0 12px; gap:8px; }
    .file-action-btn .btn-text{ display:none; }
    .file-action-btn{ padding:9px 11px; }
    .save-status{ font-size:10.5px; padding:0 4px; }

    .header{ padding:14px 16px; flex-wrap:wrap; gap:10px; }
    .logo-box{ width:140px; height:48px; }
    .doc-type{ display:none; }
    .print-btn{ padding:9px 14px; font-size:12.5px; }

    .title-block{ padding:22px 16px 18px; }
    #projectTitle{ font-size:26px; }

    .sections-wrap{ padding:16px 16px 28px; }
    .sections-grid{ grid-template-columns:1fr; }

    .crop-modal{ max-width:100%; margin:0 8px; }
    .crop-modal-body{ height:320px; }
    .crop-modal-footer{ flex-wrap:wrap; }
    .crop-modal-actions{ width:100%; justify-content:flex-end; }
  }

  /* ---------- Print ---------- */
  @media print{
    body{ background:#fff; margin:0; }
    .page-wrap{ padding:0; max-width:100%; }
    .sheet{ box-shadow:none; margin:0; max-width:100%; }
    .no-print{ display:none !important; }
    .header{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .section-card{ border:1px solid #ccc; }
    .upload-box{ border:1px solid #ccc; background:#fff; }
    .add-tile{ display:none; }
    @page{ size:A4; margin:14mm; }
  }
</style>
</head>

    <input id="projectTitle" type="text" placeholder="UNTITLED PROJECT">
    <div class="title-rule"></div>

  <div class="sections-wrap">
    <div class="sections-grid" id="sectionsGrid">
      <!-- Add tile -->
      <div class="add-tile no-print" id="addTile">
        <div class="plus">+</div>
        <span>Add section</span>
      </div>

</div>

<div class="crop-modal-overlay no-print" id="cropModalOverlay">
  <div class="crop-modal">
    <div class="crop-modal-header">
      <span>Crop &amp; resize image</span>
      <button class="crop-modal-close" id="cropModalClose">&times;</button>
    </div>
    <div class="crop-modal-body">
      <div class="crop-image-wrap">
        <img id="cropperTarget">
      </div>
    </div>
    <div class="crop-modal-footer">
      <div class="zoom-control">
        <span>Zoom</span>
        <input type="range" id="zoomRange" min="-1" max="1" step="0.01" value="0">
      </div>
      <div class="crop-modal-actions">
        <button class="btn-secondary" id="cropCancelBtn" type="button">Cancel</button>
        <button class="btn-primary" id="cropApplyBtn" type="button">Apply</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script>
  document.getElementById('dateStamp').textContent = new Date().toLocaleDateString('en-IE', { day:'numeric', month:'long', year:'numeric' });

  const grid = document.getElementById('sectionsGrid');
  const addTile = document.getElementById('addTile');
  let count = 0;

  function renumber(){
    const cards = grid.querySelectorAll('.section-card');
    cards.forEach((card, i) => {
      card.querySelector('.section-index').textContent = String(i+1).padStart(2,'0');
    });
  }

  function addSection(data){
    count++;
    const card = document.createElement('div');
    card.className = 'section-card';
    card.innerHTML = `
      <div class="section-index">${String(count).padStart(2,'0')}</div>
      <div class="section-head">
        <input class="section-title" type="text" placeholder="Section title">
        <button class="remove-btn no-print" title="Remove section">&times;</button>
      </div>
      <div class="subheadings"></div>
      <button class="add-subheading-btn no-print" type="button">+ Add sub-heading</button>
      <div class="upload-box">
        <input type="file" accept="image/*" class="file-input" hidden>
        <div class="upload-prompt">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          <span>Click to add image</span>
        </div>
        <img class="preview-img">
        <div class="image-actions no-print">
          <div class="size-controls">
            <button type="button" class="size-btn size-minus" title="Make box shorter">&minus;</button>
            <button type="button" class="size-btn size-plus" title="Make box taller">&plus;</button>
          </div>
          <div class="edit-controls">
            <button type="button" class="edit-img-btn">Edit</button>
            <button type="button" class="replace-img-btn">Replace</button>
          </div>
        </div>
      </div>
    `;

    const fileInput = card.querySelector('.file-input');
    const uploadBox = card.querySelector('.upload-box');
    const prompt = card.querySelector('.upload-prompt');
    const img = card.querySelector('.preview-img');
    const subheadingsWrap = card.querySelector('.subheadings');

    prompt.addEventListener('click', () => fileInput.click());
    uploadBox.addEventListener('click', (e) => {
      if(uploadBox.classList.contains('has-image')) return;
      if(e.target === uploadBox) fileInput.click();
    });
    img.addEventListener('click', () => openCropModal(card, img.dataset.original || img.src));
    card.querySelector('.edit-img-btn').addEventListener('click', () => {
      openCropModal(card, img.dataset.original || img.src);
    });
    card.querySelector('.replace-img-btn').addEventListener('click', () => fileInput.click());

    function stepBoxHeight(delta){
      const current = uploadBox.getBoundingClientRect().height || 170;
      const next = Math.max(90, Math.min(700, Math.round(current + delta)));
      uploadBox.style.height = next + 'px';
      scheduleSave();
    }
    card.querySelector('.size-minus').addEventListener('click', (e) => { e.stopPropagation(); stepBoxHeight(-40); });
    card.querySelector('.size-plus').addEventListener('click', (e) => { e.stopPropagation(); stepBoxHeight(40); });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        img.dataset.original = ev.target.result;
        img.src = ev.target.result;
        img.style.display = 'block';
        prompt.style.display = 'none';
        uploadBox.classList.add('has-image');
        scheduleSave();
      };
      reader.readAsDataURL(file);
      fileInput.value = '';
    });

    card.querySelector('.remove-btn').addEventListener('click', () => {
      card.remove();
      renumber();
      scheduleSave();
    });

    card.querySelector('.add-subheading-btn').addEventListener('click', () => {
      addSubheading(subheadingsWrap);
      scheduleSave();
    });

    // persist box height once a vertical drag-resize finishes
    if(window.ResizeObserver){
      new ResizeObserver(() => scheduleSave()).observe(uploadBox);
    }

    grid.insertBefore(card, addTile);

    if(data){
      card.querySelector('.section-title').value = data.title || '';
      (data.subheadings || []).forEach(text => addSubheading(subheadingsWrap, text));
      if(data.image){
        img.dataset.original = data.originalImage || data.image;
        img.src = data.image;
        img.style.display = 'block';
        prompt.style.display = 'none';
        uploadBox.classList.add('has-image');
      }
      if(data.imageHeight) uploadBox.style.height = data.imageHeight;
    } else {
      card.querySelector('.section-title').focus();
    }

    return card;
  }

  function addSubheading(container, text){
    const row = document.createElement('div');
    row.className = 'subheading-row';
    row.innerHTML = `
      <span class="subheading-dash">&ndash;</span>
      <input class="subheading-input" type="text" placeholder="Sub-heading">
      <button class="subheading-remove no-print" title="Remove sub-heading">&times;</button>
    `;
    row.querySelector('.subheading-remove').addEventListener('click', () => { row.remove(); scheduleSave(); });
    container.appendChild(row);
    if(text !== undefined){
      row.querySelector('.subheading-input').value = text;
    } else {
      row.querySelector('.subheading-input').focus();
    }
  }

  addTile.addEventListener('click', () => { addSection(); scheduleSave(); });

  // Any typed change inside the sheet schedules an autosave
  document.querySelector('.sheet').addEventListener('input', scheduleSave);

  // ---------- Crop modal ----------
  const cropModalOverlay = document.getElementById('cropModalOverlay');
  const cropperTarget = document.getElementById('cropperTarget');
  const zoomRange = document.getElementById('zoomRange');
  let cropper = null;
  let activeCard = null;
  let lastZoom = 0;

  function openCropModal(card, src){
    if(!src) return;
    if(typeof Cropper === 'undefined'){
      setStatus("Editor unavailable offline — photo kept as-is");
      setTimeout(() => setStatus('Saved'), 3000);
      return;
    }
    activeCard = card;
    cropModalOverlay.classList.add('active');
    lastZoom = 0;
    zoomRange.value = 0;

    if(cropper){ cropper.destroy(); cropper = null; }
    cropperTarget.src = src;

    cropperTarget.onload = () => {
      cropper = new Cropper(cropperTarget, {
        viewMode: 1,
        dragMode: 'move',
        background: false,
        autoCropArea: 1,
        responsive: true,
        zoomable: true
      });
    };
  }

  function closeCropModal(){
    cropModalOverlay.classList.remove('active');
    if(cropper){ cropper.destroy(); cropper = null; }
    activeCard = null;
  }

  zoomRange.addEventListener('input', () => {
    if(!cropper) return;
    const val = parseFloat(zoomRange.value);
    cropper.zoom(val - lastZoom);
    lastZoom = val;
  });

  document.getElementById('cropModalClose').addEventListener('click', closeCropModal);
  document.getElementById('cropCancelBtn').addEventListener('click', closeCropModal);

  document.getElementById('cropApplyBtn').addEventListener('click', () => {
    if(!cropper || !activeCard) return;
    const canvas = cropper.getCroppedCanvas({ maxWidth: 1600, maxHeight: 1600 });
    if(!canvas) return;
    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);

    const img = activeCard.querySelector('.preview-img');
    const uploadBox = activeCard.querySelector('.upload-box');
    const prompt = activeCard.querySelector('.upload-prompt');

    img.src = dataUrl;
    img.style.display = 'block';
    prompt.style.display = 'none';
    uploadBox.classList.add('has-image');

    closeCropModal();
    scheduleSave();
  });

  // ================= Projects, tabs & persistence =================
  const tabsBar = document.getElementById('tabsBar');
  const newProjectTab = document.getElementById('newProjectTab');
  const saveStatusEl = document.getElementById('saveStatus');
  const projectTitleInput = document.getElementById('projectTitle');

  let projectsIndex = [];   // [{id, title}]
  let currentProjectId = null;
  let saveTimer = null;
  let switching = false;

  function setStatus(text){
    saveStatusEl.textContent = text;
  }

  async function storageGet(key){
    try{
      const res = await window.storage.get(key);
      return res ? JSON.parse(res.value) : null;
    } catch(e){ return null; }
  }
  async function storageSet(key, value){
    try{ await window.storage.set(key, JSON.stringify(value)); return true; }
    catch(e){ console.error('Storage save failed', e); return false; }
  }
  async function storageDelete(key){
    try{ await window.storage.delete(key); } catch(e){ /* ignore */ }
  }

  function serializeProject(){
    const sections = Array.from(grid.querySelectorAll('.section-card')).map(card => {
      const uploadBox = card.querySelector('.upload-box');
      const img = card.querySelector('.preview-img');
      const hasImage = uploadBox.classList.contains('has-image');
      return {
        title: card.querySelector('.section-title').value,
        subheadings: Array.from(card.querySelectorAll('.subheading-input')).map(i => i.value),
        image: hasImage ? img.src : null,
        originalImage: hasImage ? (img.dataset.original || img.src) : null,
        imageHeight: uploadBox.style.height || null
      };
    });
    return { title: projectTitleInput.value, sections };
  }

  function loadProjectIntoForm(data){
    projectTitleInput.value = (data && data.title) || '';
    grid.querySelectorAll('.section-card').forEach(c => c.remove());
    count = 0;
    const sections = (data && data.sections && data.sections.length) ? data.sections : [null];
    sections.forEach(s => addSection(s));
  }

  function tabLabel(entry){
    return (entry.title && entry.title.trim()) ? entry.title.trim() : 'Untitled Project';
  }

  function renderTabs(){
    tabsBar.querySelectorAll('.project-tab').forEach(t => t.remove());
    projectsIndex.forEach(entry => {
      const tab = document.createElement('button');
      tab.type = 'button';
      tab.className = 'project-tab' + (entry.id === currentProjectId ? ' active' : '');

      const label = document.createElement('span');
      label.className = 'tab-label';
      label.textContent = tabLabel(entry);
      tab.appendChild(label);

      const close = document.createElement('span');
      close.className = 'tab-close';
      close.textContent = '\u00d7';
      close.title = 'Delete project';
      close.addEventListener('click', (e) => handleTabClose(e, entry.id, close));
      tab.appendChild(close);

      tab.addEventListener('click', () => switchToProject(entry.id));
      tabsBar.insertBefore(tab, newProjectTab);
    });
  }

  function scheduleSave(){
    if(switching) return;
    setStatus('Saving…');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveCurrentProject, 700);
  }

  async function saveCurrentProject(){
    if(!currentProjectId) return;
    const data = serializeProject();
    await storageSet('project:' + currentProjectId, data);
    const entry = projectsIndex.find(p => p.id === currentProjectId);
    if(entry){
      entry.title = data.title;
      await storageSet('projects-index', projectsIndex);
      renderTabs();
    }
    setStatus('Saved');
  }

  async function switchToProject(id){
    if(id === currentProjectId) return;
    clearTimeout(saveTimer);
    if(currentProjectId) await saveCurrentProject();
    switching = true;
    currentProjectId = id;
    const data = await storageGet('project:' + id);
    loadProjectIntoForm(data);
    renderTabs();
    setStatus('Saved');
    switching = false;
  }

  async function createNewProject(initialData){
    clearTimeout(saveTimer);
    if(currentProjectId) await saveCurrentProject();
    switching = true;
    const id = 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    projectsIndex.push({ id, title: (initialData && initialData.title) || '' });
    currentProjectId = id;
    loadProjectIntoForm(initialData || null);
    renderTabs();
    switching = false;
    await storageSet('project:' + id, serializeProject());
    await storageSet('projects-index', projectsIndex);
    setStatus('Saved');
    if(!initialData) projectTitleInput.focus();
  }

  function handleTabClose(e, id, btn){
    e.stopPropagation();
    if(btn.dataset.confirm === '1'){
      deleteProjectTab(id);
    } else {
      btn.dataset.confirm = '1';
      btn.textContent = '\u2713';
      btn.title = 'Click again to confirm delete';
      btn.classList.add('confirm');
      clearTimeout(btn._revertTimer);
      btn._revertTimer = setTimeout(() => {
        btn.dataset.confirm = '0';
        btn.textContent = '\u00d7';
        btn.classList.remove('confirm');
      }, 2500);
    }
  }

  async function deleteProjectTab(id){
    projectsIndex = projectsIndex.filter(p => p.id !== id);
    await storageDelete('project:' + id);
    await storageSet('projects-index', projectsIndex);

    if(id === currentProjectId){
      currentProjectId = null;
      if(projectsIndex.length){
        await switchToProject(projectsIndex[projectsIndex.length - 1].id);
      } else {
        await createNewProject();
      }
    } else {
      renderTabs();
    }
  }

  newProjectTab.addEventListener('click', () => createNewProject());

  // ---------- Save to / open from computer ----------
  function sanitizeFilename(name){
    const clean = (name || '').trim().replace(/[^a-z0-9\-_ ]/gi, '').replace(/\s+/g, '-');
    return (clean || 'project').slice(0, 60);
  }

  document.getElementById('saveFileBtn').addEventListener('click', async () => {
    const data = serializeProject();
    const filename = sanitizeFilename(data.title) + '.json';
    const jsonStr = JSON.stringify(data, null, 2);

    // Edge / Chrome: ask the user where to save
    if (window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: filename,
          types: [{ description: 'Project file', accept: { 'application/json': ['.json'] } }]
        });
        const writable = await handle.createWritable();
        await writable.write(jsonStr);
        await writable.close();
        setStatus('Saved to file');
        setTimeout(() => setStatus('Saved'), 2500);
        return;
      } catch (err) {
        if (err && err.name === 'AbortError') return; // user cancelled the dialog
        // otherwise fall through to the plain download below
      }
    }

    // Fallback for browsers without a save-location picker (Safari, Firefox, mobile)
    const blob = new Blob([jsonStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  const openFileInput = document.getElementById('openFileInput');
  document.getElementById('openFileBtn').addEventListener('click', () => openFileInput.click());

  openFileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    e.target.value = '';
    if(!file) return;
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      if(!data || !Array.isArray(data.sections)) throw new Error('Not a project file');
      await createNewProject(data);
    } catch(err){
      setStatus("Couldn't open that file");
      setTimeout(() => setStatus('Saved'), 3000);
    }
  });

  async function init(){
    setStatus('Loading…');
    projectsIndex = await storageGet('projects-index') || [];

    if(!projectsIndex.length){
      switching = true;
      const id = 'p' + Date.now().toString(36);
      projectsIndex = [{ id, title: '' }];
      currentProjectId = id;
      loadProjectIntoForm(null);
      renderTabs();
      switching = false;
      await storageSet('project:' + id, serializeProject());
      await storageSet('projects-index', projectsIndex);
    } else {
      switching = true;
      currentProjectId = projectsIndex[0].id;
      const data = await storageGet('project:' + currentProjectId);
      loadProjectIntoForm(data);
      renderTabs();
      switching = false;
    }
    setStatus('Saved');
  }

  init();
</script>

</body>
</html>
